arconia:
  otel:
    enabled: false
    exporter:
      type: none
    logs:
      logback-bridge:
        enabled: false
    compatibility:
      environment-variable-specification: false
  docling:
    client:
        connect-timeout: 600
        read-timeout: 600
    polling:
      delay-seconds: 2
      max-attempts: 60
  dev:
    services:
      docling:
        image-name: ghcr.io/docling-project/docling-servev1.17.0
        startup-timeout: 300s
        enabled: true
        base-url: http://localhost:5001
        serve:
          url: http://localhost:5001
          timeout-seconds: 600s
          initial-interval-seconds: 2
          backoff-coefficient: 2.0
          maximum-interval-seconds: 20
          maximum-attempts: 5
          async-poll-interval: 2s
          async-timeout: 600s
        environment:
          # Sets the backend sync processing limit (e.g., 10 minutes)
          DOCLING_SERVE_MAX_SYNC_WAIT: "600" 

management:
  server:
    port: 8086 # Port for management endpoints
  endpoints:
    health:
      show-components: always
      show-details: always
    info:
      enabled: true
    web:
      exposure:
        include: "*"
        
         # Expose all management endpoints
    prometheus:
      enabled: true # Enable Prometheus endpoint

server:
  port: 8085 # Port for your REST API
  connection-timeout: 60000
  ssl:
    enabled: false # Set to true if you want to enable SSL
spring:
  ai:
    model:
      chat: ollama
      embedding: ollama
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.3 # Or mistral, phi3, etc.
      embedding:
        options:
          model: nomic-embed-text # Popular model for embeddings
    # vectorstore:
      # opensearch:
      #   uris: http://localhost:9200
      #   index-name: my-ai-index
      #   initialize-schema: true
      #   similarity-function: cosine  # Options: cosine, l1, l2, linf
      # pgvector:
      #   dimensions: 768  # Match your embedding model (e.g., OpenAI)
      #   distance-type: COSINE_DISTANCE
      #   index-type: HNSW
      #   initialize-schema: true
    # 💡 NEW WAY: Turn OpenAI/Groq completely off using modern root properties

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  mvc:
    async:
      request-timeout: 600000
  http:
    client:
      connect-timeout: 600
      read-timeout: 600
  application:
    name: gaZap-backend
  profiles:
    active: dev
  temporal:
    start-workers: true
    workers:
      - task-queue: BioTaskQueue
        capacity:
          max-concurrent-workflow-task-pollers: 6
          max-concurrent-activity-task-pollers: 6
        rate-limits:
          max-worker-activities-per-second: 0
          max-task-queue-activities-per-second: 0
    workflow-cache:
      max-instances: 10
      max-threads: 10
    connection:
      target: localhost:7233
    workers-auto-discovery:
      packages:
        - "org.woodchuck.temporal"
springdoc:
  swagger-ui:
    request-timeout: 300000


